name: Security Pipeline
on: [push]

jobs:
  security-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalamos dockerfile-parse para que auditor.py pueda leer el archivo
          pip install dockerfile-parse 

      - name: Run Auditor
        # Importante: Tu auditor.py debe estar configurado para leer 'DockerfilePass'.
        run: python auditor.py

  build-image:
    needs: security-verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Registry
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          # CORRECCIÓN: Usamos '-f DockerfilePass' para apuntar al archivo correcto
          docker build -f DockerfilePass -t ryshar/mi-app:1.0 .
          docker push ryshar/mi-app:1.0
